<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울시 매입임대주택 조회</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;padding:16px;font-size:14px}
h1{font-size:20px;margin-bottom:12px;color:#1a1a1a}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filters select,.filters input{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff}
.filters select{min-width:120px}
.filters input[type=text]{width:200px}
.count{font-size:13px;color:#666;margin-bottom:8px}
.table-wrap{overflow-x:auto;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
th{background:#2c3e50;color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0;z-index:1}
td{padding:7px 10px;border-bottom:1px solid #eee}
tr:hover{background:#f0f7ff}
.addr{color:#1a73e8;cursor:pointer;text-decoration:underline}
.addr:hover{color:#0d47a1}
.fav-cb{width:18px;height:18px;cursor:pointer;accent-color:#e91e63}
.multi-sel{position:relative;display:inline-block}
.multi-sel-btn{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;cursor:pointer;min-width:120px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.multi-sel-drop{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid #ccc;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:10;max-height:260px;overflow-y:auto;min-width:140px;margin-top:2px}
.multi-sel-drop.open{display:block}
.multi-sel-drop label{display:block;padding:5px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
.multi-sel-drop label:hover{background:#f0f7ff}
.multi-sel-drop input{margin-right:6px;accent-color:#2c3e50}
.btn-open{background:#1a73e8;color:#fff}
.btn-open:hover{background:#1557b0}
.btn-export{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;background:#ff6f00;color:#fff}
.btn-export:hover{background:#e65100}
.low-floor{background:#fff3e0}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px}
.tag-y{background:#e8f5e9;color:#2e7d32}
.tag-n{background:#fafafa;color:#999}
.tag-low{background:#fff3e0;color:#e65100;font-weight:600}
.side-panel{position:fixed;top:0;right:0;width:45%;height:100%;background:#fff;box-shadow:-2px 0 12px rgba(0,0,0,.2);z-index:100;transform:translateX(100%);transition:transform .25s ease}
.side-panel.open{transform:translateX(0)}
.side-panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#2c3e50;color:#fff;font-size:14px}
.side-panel-header button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px}
.side-panel-header a{color:#fff;font-size:12px;text-decoration:underline;margin-right:8px}
.side-panel iframe{width:100%;height:calc(100% - 44px);border:none}
@media(max-width:768px){
.side-panel{width:100%}
body{padding:10px}
h1{font-size:18px;margin-bottom:10px}
.filters{gap:6px}
.filters>select,.filters>input,.filters>label input,.multi-sel-btn{font-size:14px;padding:8px 10px;width:100%}
.filters select{min-width:0}
.multi-sel{width:100%}
.multi-sel-btn{max-width:none}
.filters input[type=text]{width:100%}
.filters label{width:100%;font-size:14px}
.filters label input[type=number]{width:70px}
.btn-export{width:100%;padding:10px}
.table-wrap{display:none}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card.low-floor{background:#fff3e0}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-top .fav-cb{width:22px;height:22px}
.card-id{font-size:12px;color:#999}
.card-addr{color:#1a73e8;font-size:15px;font-weight:600;text-decoration:underline;cursor:pointer;line-height:1.4;margin-bottom:8px;display:block}
.card-info{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:13px;color:#555}
.card-info span{white-space:nowrap}
.card-price{display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid #eee;font-size:13px}
.card-price strong{color:#333}
}
@media(min-width:769px){.cards{display:none}}
</style>
</head>

function fmtW(n){return n?n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','):'-'}

const DATA = RAW.split('\n').map(line => {
  const c = line.split('|');
  if (c.length < 11) return null;
  return {id:+c[0],gu:c[1],danji:c[2],addr:c[3],ho:c[4],low_floor:c[5],area:parseFloat(c[6]),rooms:c[7],elevator:c[8],mech_parking:c[9],parking:c[10]};
}).filter(Boolean);

let favs = {};
try { favs = JSON.parse(localStorage.getItem('favs') || '{}'); } catch(e) {}

function naverMapURL(addr) {
  return 'https://map.naver.com/v5/search/' + encodeURIComponent('서울특별시 ' + addr);
}

function openPanel(addr) {
  const url = naverMapURL(addr);
  document.getElementById('panelTitle').textContent = addr;
  document.getElementById('panelExtLink').href = url;
  document.getElementById('panelFrame').src = url;
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('panelFrame').src = '';
}

function toggleFav(id) {
  if (favs[id]) delete favs[id]; else favs[id] = true;
  localStorage.setItem('favs', JSON.stringify(favs));
}

function populateFilters() {
  const gus = [...new Set(DATA.map(d => d.gu))].sort();
  const drop = document.getElementById('fGuDrop');
  gus.forEach(g => {
    const lbl = document.createElement('label');
    lbl.innerHTML = `<input type="checkbox" value="${g}"> ${g}`;
    lbl.querySelector('input').addEventListener('change', () => { updateGuBtn(); render(); });
    drop.appendChild(lbl);
  });
  const rooms = [...new Set(DATA.map(d => d.rooms))].sort();
  const rSel = document.getElementById('fRoom');
  rooms.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; rSel.appendChild(o); });
}

function getSelectedGus() {
  return [...document.querySelectorAll('#fGuDrop input:checked')].map(cb => cb.value);
}

function updateGuBtn() {
  const sel = getSelectedGus();
  document.getElementById('fGuBtn').textContent = sel.length === 0 ? '전체 자치구' : sel.length <= 3 ? sel.join(', ') : sel.length + '개 자치구';
}

function saveFilters() {
  try {
    localStorage.setItem('filters', JSON.stringify({
      gus: getSelectedGus(),
      room: document.getElementById('fRoom').value,
      elev: document.getElementById('fElev').value,
      low: document.getElementById('fLow').value,
      fav: document.getElementById('fFav').value,
      addr: document.getElementById('fAddr').value,
      aMin: document.getElementById('fAreaMin').value,
      aMax: document.getElementById('fAreaMax').value
    }));
  } catch(e) {}
}

function loadFilters() {
  try {
    const f = JSON.parse(localStorage.getItem('filters'));
    if (!f) return;
    if (f.gus && f.gus.length) {
      document.querySelectorAll('#fGuDrop input').forEach(cb => { cb.checked = f.gus.includes(cb.value); });
      updateGuBtn();
    }
    if (f.room) document.getElementById('fRoom').value = f.room;
    if (f.elev) document.getElementById('fElev').value = f.elev;
    if (f.low) document.getElementById('fLow').value = f.low;
    if (f.fav) document.getElementById('fFav').value = f.fav;
    if (f.addr) document.getElementById('fAddr').value = f.addr;
    if (f.aMin) document.getElementById('fAreaMin').value = f.aMin;
    if (f.aMax) document.getElementById('fAreaMax').value = f.aMax;
  } catch(e) {}
}

function getFiltered() {
  const gus = getSelectedGus();
  const room = document.getElementById('fRoom').value;
  const elev = document.getElementById('fElev').value;
  const low = document.getElementById('fLow').value;
  const addr = document.getElementById('fAddr').value.trim().toLowerCase();
  const aMin = document.getElementById('fAreaMin').value;
  const aMax = document.getElementById('fAreaMax').value;
  const favOnly = document.getElementById('fFav').value === 'Y';
  return DATA.filter(d =>
    (!gus.length || gus.includes(d.gu)) &&
    (!room || d.rooms === room) &&
    (!elev || d.elevator === elev) &&
    (!low || d.low_floor === low) &&
    (!addr || d.addr.toLowerCase().includes(addr)) &&
    (!aMin || d.area >= parseFloat(aMin)) &&
    (!aMax || d.area <= parseFloat(aMax)) &&
    (!favOnly || favs[d.id])
  );
}

function render() {
  saveFilters();
  const data = getFiltered();
  document.getElementById('count').textContent = `총 ${data.length}건`;
  // Desktop table
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(d => {
    const tr = document.createElement('tr');
    if (d.low_floor === '○') tr.className = 'low-floor';
    const pr = PRICE[d.id];
    tr.innerHTML = `
      <td><input type="checkbox" class="fav-cb" ${favs[d.id]?'checked':''} onchange="toggleFav(${d.id})"></td>
      <td>${d.id}</td><td>${d.gu}</td><td>${d.danji}</td>
      <td class="addr" onclick="openPanel('${d.addr.replace(/'/g,"\\'")}')" title="네이버지도에서 검색">${d.addr}</td>
      <td>${d.ho}</td>
      <td>${d.low_floor==='○'?'<span class="tag tag-low">저층</span>':'<span class="tag tag-n">-</span>'}</td>
      <td>${d.area}㎡</td><td>${d.rooms}</td>
      <td>${d.elevator==='○'?'<span class="tag tag-y">○</span>':'<span class="tag tag-n">X</span>'}</td>
      <td>${d.mech_parking==='○'?'<span class="tag tag-y">○</span>':'<span class="tag tag-n">X</span>'}</td>
      <td>${d.parking}</td>
      <td>${pr?fmtW(pr[0]):'-'}</td><td>${pr?fmtW(pr[1]):'-'}</td>`;
    tbody.appendChild(tr);
  });
  // Mobile cards
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  data.forEach(d => {
    const pr = PRICE[d.id];
    const div = document.createElement('div');
    div.className = 'card' + (d.low_floor === '○' ? ' low-floor' : '');
    div.innerHTML = `
      <div class="card-top">
        <span class="card-id">#${d.id} ${d.gu} ${d.danji} ${d.ho}</span>
        <input type="checkbox" class="fav-cb" ${favs[d.id]?'checked':''} onchange="toggleFav(${d.id})">
      </div>
      <span class="card-addr" onclick="openPanel('${d.addr.replace(/'/g,"\\'")}')">
        ${d.addr}
      </span>
      <div class="card-info">
        <span>${d.area}㎡</span>
        <span>방 ${d.rooms}</span>
        <span>승강기 ${d.elevator}</span>
        ${d.low_floor==='○'?'<span class="tag tag-low">저층</span>':''}
        ${d.mech_parking==='○'?'<span>기계식주차</span>':''}
        <span>주차 ${d.parking}대</span>
      </div>
      ${pr?`<div class="card-price">
        <span>보증금 <strong>${fmtW(pr[0])}</strong></span>
        <span>월세 <strong>${fmtW(pr[1])}</strong></span>
      </div>`:''}`;
    cards.appendChild(div);
  });
}

function exportCSV() {
  const data = getFiltered();
  if (!data.length) return;
  const header = '번호,자치구,단지번호,주소,호,저층,전용면적,방,승강기,기계식주차,주차,보증금(80%),월임대료(80%)\n';
  const csv = header + data.map(d => {
    const pr = PRICE[d.id];
    return [d.id,d.gu,d.danji,d.addr,d.ho,d.low_floor,d.area,d.rooms,d.elevator,d.mech_parking,d.parking,pr?pr[0]:'',pr?pr[1]:''].map(c => `"${String(c).replace(/"/g,'""')}"`).join(',');
  }).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '매입임대주택_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}
